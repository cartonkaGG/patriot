<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Товар — Patriot Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            patriot: {
              primary: '#1C1917',
              secondary: '#44403C',
              accent: '#CA8A04',
              'accent-light': '#EAB308',
              bg: '#FAFAF9',
              text: '#0C0A09',
              muted: '#57534E',
              surface: '#F5F5F4',
            }
          },
          fontFamily: {
            heading: ['Cormorant', 'serif'],
            body: ['Montserrat', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-body bg-patriot-bg text-patriot-text antialiased">

  <header class="fixed top-4 left-4 right-4 z-50">
    <nav class="glass-nav max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between rounded-2xl">
      <a href="index.html" class="flex items-center gap-3 group cursor-pointer">
        <div class="w-10 h-10 rounded-lg bg-patriot-primary flex items-center justify-center border border-patriot-accent/30">
          <svg class="w-6 h-6 text-patriot-accent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3L4 9v12h16V9l-8-6z"/>
          </svg>
        </div>
        <span class="font-heading text-2xl font-bold tracking-wider text-patriot-primary">PATRIOT</span>
      </a>
      <div class="flex items-center gap-2">
        <a href="index.html#catalog" class="nav-link hidden sm:block cursor-pointer">Каталог</a>
        <button id="cart-btn" class="icon-btn relative cursor-pointer" aria-label="Кошик">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          <span id="cart-count" class="absolute -top-1 -right-1 w-5 h-5 bg-patriot-accent text-white text-[10px] font-bold rounded-full flex items-center justify-center hidden">0</span>
        </button>
      </div>
    </nav>
  </header>

  <div id="cart-overlay" class="fixed inset-0 z-[60] bg-patriot-primary/50 backdrop-blur-sm hidden" aria-hidden="true"></div>
  <aside id="cart-sidebar" class="fixed top-0 right-0 z-[70] h-full w-full max-w-md bg-white shadow-2xl translate-x-full transition-transform duration-300 ease-out flex flex-col" aria-label="Кошик">
    <div class="p-6 border-b border-stone-200 flex items-center justify-between">
      <h2 class="font-heading text-2xl font-semibold">Кошик</h2>
      <button id="cart-close" class="icon-btn cursor-pointer" aria-label="Закрити кошик">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
    <div class="p-6 border-t border-stone-200 bg-patriot-surface">
      <div class="flex justify-between mb-4">
        <span class="text-patriot-muted">Разом:</span>
        <span id="cart-total" class="font-semibold text-xl">0 ₴</span>
      </div>
      <a href="checkout.html" class="btn-primary w-full text-center block cursor-pointer">Оформити замовлення</a>
    </div>
  </aside>

  <main class="pt-28 pb-16 px-4 sm:px-6">
    <div id="product-loading" class="max-w-7xl mx-auto text-center py-20">
      <p class="text-patriot-muted">Завантаження...</p>
    </div>
    <div id="product-not-found" class="max-w-7xl mx-auto text-center py-20 hidden">
      <h1 class="font-heading text-4xl font-bold mb-4">Товар не знайдено</h1>
      <a href="index.html#catalog" class="btn-primary inline-block cursor-pointer">Повернутися до каталогу</a>
    </div>
    <div id="product-content" class="max-w-7xl mx-auto hidden">
      <nav class="text-sm text-patriot-muted mb-8" aria-label="Breadcrumb">
        <a href="index.html" class="hover:text-patriot-accent transition-colors cursor-pointer">Головна</a>
        <span class="mx-2">/</span>
        <a href="index.html#catalog" id="breadcrumb-category" class="hover:text-patriot-accent transition-colors cursor-pointer"></a>
        <span class="mx-2">/</span>
        <span id="breadcrumb-name" class="text-patriot-text"></span>
      </nav>
      <div class="grid lg:grid-cols-2 gap-12">
        <div>
          <div class="product-image-viewer">
            <button type="button" id="gallery-prev" class="gallery-nav gallery-nav--prev hidden cursor-pointer" aria-label="Попереднє фото">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div class="product-detail-image rounded-2xl overflow-hidden aspect-square" id="product-image"></div>
            <button type="button" id="gallery-next" class="gallery-nav gallery-nav--next hidden cursor-pointer" aria-label="Наступне фото">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </button>
            <span id="gallery-counter" class="gallery-counter hidden" aria-live="polite"></span>
          </div>
          <div id="product-gallery" class="product-gallery hidden"></div>
        </div>
        <div>
          <div id="product-badge" class="mb-3"></div>
          <span id="product-category" class="text-xs uppercase tracking-wider text-patriot-accent font-semibold"></span>
          <h1 id="product-name" class="font-heading text-4xl sm:text-5xl font-bold mt-2 mb-4"></h1>
          <div id="product-price" class="product-price-block mb-2"></div>
          <div id="product-stock" class="mb-6"></div>
          <p id="product-short-desc" class="text-patriot-muted leading-relaxed mb-8"></p>
          <div class="flex flex-col sm:flex-row gap-4 mb-10">
            <div class="qty-controls qty-controls-lg">
              <button class="qty-btn cursor-pointer" id="qty-decrease" aria-label="Зменшити">−</button>
              <span class="qty-value" id="product-qty">1</span>
              <button class="qty-btn cursor-pointer" id="qty-increase" aria-label="Збільшити">+</button>
            </div>
            <button id="add-to-cart-detail" class="btn-primary flex-1 cursor-pointer">Додати до кошика</button>
          </div>
          <div class="glass-card p-6">
            <h2 class="font-heading text-xl font-semibold mb-4">Опис</h2>
            <p id="product-full-desc" class="text-patriot-muted leading-relaxed"></p>
          </div>
        </div>
      </div>
      <div class="mt-16">
        <h2 class="font-heading text-2xl font-semibold mb-6">Характеристики</h2>
        <ul id="product-specs" class="specs-list"></ul>
      </div>
      <div class="mt-16">
        <h2 class="font-heading text-2xl font-semibold mb-6">Схожі товари</h2>
        <div id="related-products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
      </div>
    </div>
  </main>

  <footer class="bg-patriot-primary text-stone-400 py-8 px-4 sm:px-6 text-center text-sm">
    <p>&copy; 2026 Patriot Store · <a href="tel:+380997577214" class="text-patriot-accent hover:underline cursor-pointer">+380 99 757 72 14</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/data.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
