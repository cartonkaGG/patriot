<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Особистий кабінет — Patriot Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Cormorant', 'serif'],
            body: ['Montserrat', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/cabinet.css">
</head>
<body class="font-body antialiased">

  <div class="cabinet-page">
    <div class="cabinet-bg" aria-hidden="true"></div>

    <header class="cabinet-header">
      <nav class="cabinet-nav">
        <a href="index.html" class="cabinet-nav-logo cursor-pointer">
          <div class="cabinet-nav-logo-icon">
            <svg class="w-5 h-5 text-[#CA8A04]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3L4 9v12h16V9l-8-6z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 21V12h6v9"/>
            </svg>
          </div>
          PATRIOT
        </a>
        <div class="cabinet-nav-actions">
          <a href="index.html#catalog" class="cabinet-nav-link cursor-pointer hidden sm:block">Каталог</a>
          <button type="button" id="logout-btn" class="cabinet-logout cursor-pointer">Вийти</button>
        </div>
      </nav>
    </header>

    <main class="cabinet-main">
      <section class="cabinet-hero">
        <div class="cabinet-hero-inner">
          <div class="cabinet-avatar" id="user-avatar" aria-hidden="true">?</div>
          <div class="cabinet-hero-text">
            <p class="cabinet-hero-label">Особистий кабінет</p>
            <h1 class="cabinet-hero-title" id="user-greeting">Вітаємо!</h1>
            <p class="cabinet-hero-contact" id="user-email"></p>
            <p class="cabinet-hero-contact" id="user-phone"></p>
            <p class="cabinet-hero-sub" id="user-meta"></p>
          </div>
        </div>
      </section>

      <section class="cabinet-card">
        <div class="cabinet-card-header">
          <div class="cabinet-card-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          </div>
          <div>
            <h2 class="cabinet-card-title">Мої замовлення</h2>
            <p class="cabinet-card-desc">Відстежуйте статус кожного замовлення</p>
          </div>
        </div>

        <div id="orders-loading" class="cabinet-orders-loading">
          <div class="cabinet-spinner" aria-hidden="true"></div>
          Завантаження замовлень...
        </div>

        <div id="orders-empty" class="cabinet-orders-empty hidden">
          <div class="cabinet-orders-empty-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          </div>
          <p>У вас ще немає замовлень.<br>Час обрати щось цікаве!</p>
          <a href="index.html#catalog" class="cursor-pointer">Перейти до каталогу</a>
        </div>

        <div id="orders-list" class="cabinet-orders-list hidden"></div>
      </section>
    </main>
  </div>

  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[80] px-6 py-3 rounded-xl bg-patriot-primary text-white text-sm font-medium shadow-2xl translate-y-20 opacity-0 transition-all duration-300 pointer-events-none" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/data.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/order-status.js"></script>
  <script src="js/cabinet.js"></script>
</body>
</html>
