<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вхід — Patriot Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Cormorant', 'serif'],
            body: ['Montserrat', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="font-body antialiased">

  <div class="auth-page">
    <div class="auth-bg" aria-hidden="true"></div>
    <div class="auth-bg-pattern" aria-hidden="true"></div>
    <div class="auth-orb auth-orb-1" aria-hidden="true"></div>
    <div class="auth-orb auth-orb-2" aria-hidden="true"></div>

    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html" class="auth-logo-link cursor-pointer flex flex-col items-center">
          <div class="auth-logo-icon">
            <svg class="w-7 h-7 text-[#CA8A04]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3L4 9v12h16V9l-8-6z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 21V12h6v9"/>
            </svg>
          </div>
          <span class="auth-logo-text">PATRIOT</span>
          <span class="auth-logo-sub">Особистий кабінет</span>
        </a>
      </div>

      <div id="db-not-configured" class="auth-alert hidden">
        База даних не підключена. Налаштуйте Supabase в адмін-панелі.
      </div>

      <div class="auth-tabs" id="auth-tabs" data-active="login">
        <div class="auth-tab-indicator" aria-hidden="true"></div>
        <button type="button" id="tab-login" class="auth-tab-btn active cursor-pointer">Вхід</button>
        <button type="button" id="tab-register" class="auth-tab-btn cursor-pointer">Реєстрація</button>
      </div>

      <!-- Login -->
      <div id="panel-login" class="auth-panel active">
        <form id="login-form" class="space-y-4">
          <div class="auth-field">
            <label for="login-email" class="auth-label">Email</label>
            <input type="email" id="login-email" class="auth-input" autocomplete="email" placeholder="your@email.com" required>
          </div>
          <div class="auth-field">
            <label for="login-password" class="auth-label">Пароль</label>
            <input type="password" id="login-password" class="auth-input" autocomplete="current-password" placeholder="••••••••" required>
          </div>
          <div class="auth-field">
            <button type="submit" id="login-submit-btn" class="auth-submit">Увійти</button>
          </div>
        </form>
        <div id="resend-email-block" class="auth-resend hidden">
          <p>Email не підтверджено. Перевірте пошту та папку «Спам».</p>
          <button type="button" id="resend-email-btn" class="auth-resend-btn cursor-pointer">Надіслати лист повторно</button>
        </div>
      </div>

      <!-- Register -->
      <div id="panel-register" class="auth-panel">
        <form id="register-form" class="space-y-4">
          <div class="auth-field">
            <label for="reg-name" class="auth-label">ПІБ</label>
            <input type="text" id="reg-name" class="auth-input" placeholder="Іван Петренко" required>
          </div>
          <div class="auth-field">
            <label for="reg-phone" class="auth-label">Телефон</label>
            <input type="tel" id="reg-phone" class="auth-input" placeholder="+380991234567" required>
          </div>
          <div class="auth-field">
            <label for="reg-email" class="auth-label">Email</label>
            <input type="email" id="reg-email" class="auth-input" placeholder="your@email.com" autocomplete="email" required>
          </div>
          <div class="auth-field">
            <label for="reg-password" class="auth-label">Пароль</label>
            <input type="password" id="reg-password" class="auth-input" placeholder="Мінімум 6 символів" minlength="6" autocomplete="new-password" required>
            <p class="auth-hint">Телефон і email зберігаються в одному профілі</p>
          </div>
          <div class="auth-field">
            <button type="submit" class="auth-submit">Створити акаунт</button>
          </div>
        </form>
      </div>

      <div class="auth-divider">або</div>

      <button type="button" id="google-btn" class="auth-google-btn">
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Увійти через Google
      </button>

      <div id="auth-message" class="auth-message hidden" role="status" aria-live="polite"></div>

      <a href="index.html" class="auth-back cursor-pointer">← Повернутися до магазину</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/data.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/account.js"></script>
</body>
</html>
